body:
  text: 十不二門樞要敘十不二門解釋而衆者安不由文以意為主悟意不侔文隨意變故諸先達不克自默今亦然也十門之作正為于觀故曰觀心乃是教行樞機輒以樞要名云紹興戊午八月丙辰墨禪齋敘
